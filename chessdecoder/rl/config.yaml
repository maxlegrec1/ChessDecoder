project_name: chess-decoder-grpo
run_name: grpo-v1

model:
  embed_dim: 1024
  num_heads: 16
  num_layers: 12
  max_seq_len: 4096
  d_ff: 1536
  n_buckets: 100
  wl_sigma: 0.4
  value_hidden_size: 256
  num_fourier_freq: 128

grpo:
  group_size: 10
  clip_epsilon_low: 0.2
  clip_epsilon_high: 0.28
  kl_coeff: 0.05
  ppo_epochs: 1
  max_kl: 1
  # Treat WL/D bucket samples as additional policy actions. Requires
  # rollout.wl_temperature and rollout.d_temperature to be > 0 below.
  value_action_space: true
  # ProRL periodic reference reset. 0 = disabled (vanilla GRPO);
  # otherwise every N outer steps copy the current policy into ref_model
  # and zero the optimizer moments. Pairs naturally with a higher kl_coeff.
  reset_ref_every: 12

rollout:
  rollout_batch_size: 320
  # CUTLASS engine bench on B200: B=64 → 10.12 FEN/s, B=128 → 12.27, B=160
  # → 14.22, B≥176 hangs (cuBLAS/allocator regime change above the cliff).
  # B=160 is the empirical max; arena uses ~55 GB / 67 GB reserved at B=160,
  # plenty of headroom for training to coexist after engine teardown.
  inference_batch_size: 160
  think_temperature: 0.8
  policy_temperature: 0.8
  board_temperature: 0.0
  wl_temperature: 0.5
  d_temperature: 0.5

training:
  learning_rate: 1.0e-5
  weight_decay: 0.1
  warmup_steps: 20
  # mini_batch_size × grad_accum_steps = 64 (effective per-update batch).
  # Bumped mini_batch from 4 → 16 (and accum 16 → 4) — backward at M=4×4096
  # under-utilised the B200; M=16×4096 is much more SM-saturating. Activation
  # memory budget at mini_batch=16 ≈ 14 GB (vs 180 GB available during
  # training, after the inference engine is torn down).
  grad_accum_steps: 4
  max_grad_norm: 1.0
  use_amp: true
  mini_batch_size: 16
  finetuned_checkpoint: "checkpoints/finetune-thinking-v1_20260422_135004/checkpoint_step_326000.pt"
  checkpoint_dir: checkpoints/
  save_every: 1
  eval_every: 1
  log_every: 1
  num_outer_steps: 500

rewards:
  reward_move_quality_weight: 1.0
  reward_format_weight: 0.5
  reward_coherence_weight: 0.3
  # When true, format and coherence stop being additive rewards and instead
  # gate move_quality: a rollout only earns its move_quality reward if BOTH
  # format == 1.0 AND coherence == 1.0; otherwise total reward is 0.
  # The format/coherence weights above are ignored in this mode.
  format_coherence_as_gate: true

data:
  variation_parquet_dir: ./data/variations/
  pretrain_parquet_dir: ./data/pretrain/
  pretrain_train_split: 0.8
  num_eval_positions: 200
  eval_seed: 42
  # Continuous-reward training source: HF ChessFENS-style parquets
  # (fen + 1858-float policy column). When set, replaces the binary
  # best-move pretrain stream with PolicyPositionStream. move_quality_reward
  # automatically becomes the teacher policy probability of the chosen move.
  # Empty string disables this and falls back to the legacy pretrain stream.
  policy_parquet_dir: ./data/policy_eval/
  policy_stream_mirror_prob: 0.5
  policy_stream_positions_per_file: 0   # 0 = use all rows; e.g. 50000 to cap
