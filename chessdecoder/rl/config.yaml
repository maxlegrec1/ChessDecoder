project_name: chess-decoder-grpo
run_name: grpo-v1

model:
  embed_dim: 1024
  num_heads: 16
  num_layers: 12
  max_seq_len: 4096
  d_ff: 1536
  n_buckets: 100
  wl_sigma: 0.4
  value_hidden_size: 256
  num_fourier_freq: 128

grpo:
  group_size: 10
  clip_epsilon_low: 0.2
  clip_epsilon_high: 0.28
  kl_coeff: 0.005
  ppo_epochs: 1
  max_kl: 1000.0

rollout:
  rollout_batch_size: 320
  inference_batch_size: 32
  think_temperature: 0.8
  policy_temperature: 0.8
  board_temperature: 0.0

training:
  learning_rate: 6.0e-6
  weight_decay: 0.1
  warmup_steps: 20
  grad_accum_steps: 16
  max_grad_norm: 1.0
  use_amp: true
  mini_batch_size: 4
  finetuned_checkpoint: "checkpoints/finetune-thinking-v1_20260320_205453/checkpoint_step_282000.pt"
  resume_from: "checkpoints/grpo-v1_20260411_232441"
  checkpoint_dir: checkpoints/
  save_every: 1
  eval_every: 1
  log_every: 1
  num_outer_steps: 500

rewards:
  reward_move_quality_weight: 1.0
  reward_format_weight: 0.5
  reward_coherence_weight: 0.3
  # When true, format and coherence stop being additive rewards and instead
  # gate move_quality: a rollout only earns its move_quality reward if BOTH
  # format == 1.0 AND coherence == 1.0; otherwise total reward is 0.
  # The format/coherence weights above are ignored in this mode.
  format_coherence_as_gate: true

data:
  variation_parquet_dir: ./parquets_variations/
  pretrain_parquet_dir: /home/maxime/parquet_files_decoder/
  num_eval_positions: 200
  eval_seed: 42
