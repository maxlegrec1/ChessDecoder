# PREPROCESS + LOWERED AdamW arm. Same as bt4_history8_preprocess but the
# whole non-Muon (AdamW) arm runs at 5e-4 instead of 3e-3 (adamw_lr_mult
# 0.0833 = 5e-4 / 6e-3). Tests whether the preprocessor's degradation was an
# AdamW-LR-too-high problem (pre_lin is 27.3M of the 31.9M AdamW arm).
# Muon arm unchanged at 6e-3. Same seed/data/batch/history as the A/B partners.
project_name: "chess-decoder"
run_name: "bt4_history8_preprocess_lowadam"

data:
  parquet_dir: "data/parquets"
  cache_dir: "data/cache"
  batch_size: 1024
  num_workers: 4
  positions_per_game: 1
  history: 8

model:
  embed_dim: 1024
  num_heads: 32
  num_layers: 15
  d_ff: 1536
  attention_variant: "geom"
  policy_head: "cross_attn"
  input_mode: "lc0_64"
  history: 8
  input_preprocess: true
  preprocess_dim: 512

training:
  optimizer: "muon"
  learning_rate: 6.0e-3
  adamw_lr_mult: 0.083333       # AdamW arm -> 5e-4 (was 0.5 -> 3e-3)
  weight_decay: 0.01
  grad_clip: 1.0
  gradient_accumulation_steps: 1
  num_epochs: 1000
  log_every_n_steps: 5
  save_every_n_steps: 64000
  device: "cuda"
  use_amp: true
  use_fp8: true
  fp8_recipe: "tensorwise"
  fp8_compile: true
  checkpoint_dir: "checkpoints/bt4_history8_preprocess_lowadam/"
  seed: 42
  resume_from: null
  reset_data_iteration: false
  max_steps: 64000
  peak_tflops: 1979
  val_pct: 2
  val_every_n_steps: 1000
  val_batches: 64

loss:
  policy_weight: 5.0
  wdl_weight: 1.0
