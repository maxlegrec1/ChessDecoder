# Replica of the wandb run "scaling_60M" (id to9fj3zu) for a perf/step sanity
# check on this machine + our data. Architecture/hparams copied verbatim;
# only data paths point at our local cache, and a 2% held-out val split is
# added (negligible data change) so we can see if even the 60M overfits here.
project_name: "chess-decoder"
run_name: "scaling_60M_fixed"

data:
  parquet_dir: "data/parquets"
  cache_dir: "data/cache"
  batch_size: 1024
  num_workers: 3
  positions_per_game: 1

model:
  embed_dim: 640
  num_heads: 10
  num_layers: 8
  d_ff: 2560
  attention_variant: "geom"
  policy_head: "cross_attn"
  input_mode: "lc0_64"

training:
  optimizer: "muon"
  learning_rate: 3.0e-3
  weight_decay: 0.01
  grad_clip: 1.0
  gradient_accumulation_steps: 2
  num_epochs: 1000
  log_every_n_steps: 200
  save_every_n_steps: 1000000
  device: "cuda"
  use_amp: true
  use_fp8: true
  fp8_recipe: "tensorwise"
  fp8_compile: true
  checkpoint_dir: "checkpoints/scaling_60M_fixed/"
  seed: 42
  resume_from: null
  reset_data_iteration: false
  max_steps: 100000
  peak_tflops: 1979
  val_pct: 2
  val_every_n_steps: 1000
  val_batches: 8

loss:
  policy_weight: 5.0
  wdl_weight: 1.0
