# 441M MoE at embed 1024: 8 experts of d_ff 2048, top-2 -> 2 active * 2048 =
# 4096 = the dense d_ff (iso-active-FLOP vs config_140M_dense). 4x the FFN
# params, sparsely accessed. Fixed-capacity + fp8_compile -> compiles cleanly.
project_name: "chess-decoder"
run_name: "scaling_140M_moe8e_top2"

data:
  parquet_dir: "data/parquets"
  cache_dir: "data/cache"
  batch_size: 1024
  num_workers: 3
  positions_per_game: 1

model:
  embed_dim: 1024
  num_heads: 16
  num_layers: 8
  d_ff: 4096
  attention_variant: "geom"
  policy_head: "cross_attn"
  input_mode: "lc0_64"
  ffn_type: "moe"
  moe_num_experts: 8
  moe_top_k: 2
  moe_expert_d_ff: 2048       # 2 active * 2048 = 4096 = dense d_ff (iso-FLOP)
  moe_aux_loss_weight: 1.0e-2
  moe_capacity_factor: 1.25   # fixed capacity -> static shapes -> compiles
  moe_router_noise: 0.0

training:
  optimizer: "muon"
  learning_rate: 3.0e-3
  weight_decay: 0.01
  grad_clip: 1.0
  gradient_accumulation_steps: 2
  num_epochs: 1000
  log_every_n_steps: 200
  save_every_n_steps: 1000000
  device: "cuda"
  use_amp: true
  use_fp8: true
  fp8_recipe: "tensorwise"
  fp8_compile: true
  checkpoint_dir: "checkpoints/scaling_140M_moe8e/"
  seed: 42
  resume_from: null
  reset_data_iteration: false
  max_steps: 50000
  peak_tflops: 1979
  val_pct: 2
  val_every_n_steps: 1000
  val_batches: 8

loss:
  policy_weight: 5.0
  wdl_weight: 1.0
