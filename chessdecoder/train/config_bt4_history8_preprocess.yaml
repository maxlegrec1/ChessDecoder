# BT4-STYLE GLOBAL INPUT PREPROCESSOR on top of geom + 8-ply history.
# A/B partner of the bt4_history8_long baseline (146.71M): IDENTICAL config
# (batch 1024, ppg 1, grad_accum 1, history 8, lr 0.006, adamw_lr_mult 0.5,
# wd 0.01, geom, cross_attn, lc0_64, fp8, seed 42, max_steps 64000, val 64
# batches) — the ONLY change is input_preprocess: true (+28.9M params).
# Tests whether lc0's embedding_preprocess (a dense layer that mixes the whole
# board's piece placement into a per-square summary before attention) helps.
project_name: "chess-decoder"
run_name: "bt4_history8_preprocess"

data:
  parquet_dir: "data/parquets"
  cache_dir: "data/cache"
  batch_size: 1024
  num_workers: 4
  positions_per_game: 1
  history: 8

model:
  embed_dim: 1024
  num_heads: 32
  num_layers: 15
  d_ff: 1536
  attention_variant: "geom"
  policy_head: "cross_attn"
  input_mode: "lc0_64"
  history: 8
  input_preprocess: true       # <-- the only difference vs bt4_history8_long
  preprocess_dim: 512

training:
  optimizer: "muon"
  learning_rate: 6.0e-3
  adamw_lr_mult: 0.5
  weight_decay: 0.01
  grad_clip: 1.0
  gradient_accumulation_steps: 1
  num_epochs: 1000
  log_every_n_steps: 5
  save_every_n_steps: 64000        # only the final step; epoch saves still fire
  device: "cuda"
  use_amp: true
  use_fp8: true
  fp8_recipe: "tensorwise"
  fp8_compile: true
  checkpoint_dir: "checkpoints/bt4_history8_preprocess/"
  seed: 42
  resume_from: null
  reset_data_iteration: false
  max_steps: 64000
  peak_tflops: 1979
  val_pct: 2
  val_every_n_steps: 1000
  val_batches: 64

loss:
  policy_weight: 5.0
  wdl_weight: 1.0
