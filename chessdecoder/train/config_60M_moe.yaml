# MoE counterpart of config_scaling_60M.yaml. IDENTICAL except the FFN:
# 8 experts, top-2, expert_d_ff = 1280 -> 2 active experts = 2560 = the dense
# baseline's d_ff (iso-active-FLOP). MoE carries ~4x the FFN params, sparsely
# accessed. Compare loss & loss/compute-hour vs config_scaling_60M (dense-2560).
# fp8_compile is off: the grouped-GEMM token-padding is data-dependent and
# breaks torch.compile's static shapes (eager fp8 grouped-GEMM still runs).
project_name: "chess-decoder"
run_name: "scaling_60M_moe8e_top2"

data:
  parquet_dir: "data/parquets"
  cache_dir: "data/cache"
  batch_size: 1024
  num_workers: 3
  positions_per_game: 1

model:
  embed_dim: 640
  num_heads: 10
  num_layers: 8
  d_ff: 2560
  attention_variant: "geom"
  policy_head: "cross_attn"
  input_mode: "lc0_64"
  ffn_type: "moe"
  moe_num_experts: 8
  moe_top_k: 2
  moe_expert_d_ff: 1280       # 2 active * 1280 = 2560 = dense d_ff (iso-FLOP)
  moe_aux_loss_weight: 1.0e-2
  moe_capacity_factor: 1.25   # fixed per-expert capacity -> static shapes -> compiles
  moe_router_noise: 0.0       # Shazeer noisy-gating stddev (0 = off)

training:
  optimizer: "muon"
  learning_rate: 3.0e-3
  weight_decay: 0.01
  grad_clip: 1.0
  gradient_accumulation_steps: 2
  num_epochs: 1000
  log_every_n_steps: 200
  save_every_n_steps: 1000000
  device: "cuda"
  use_amp: true
  use_fp8: true
  fp8_recipe: "tensorwise"
  fp8_compile: true
  checkpoint_dir: "checkpoints/scaling_60M_moe8e/"
  seed: 42
  resume_from: null
  reset_data_iteration: false
  max_steps: 100000
  peak_tflops: 1979
  val_pct: 2
  val_every_n_steps: 1000
  val_batches: 8

loss:
  policy_weight: 5.0
  wdl_weight: 1.0
