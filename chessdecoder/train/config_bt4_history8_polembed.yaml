# BT4's policy_embedding tweak on top of geom + 8-ply history. A/B partner of
# bt4_history8_long (146.71M): IDENTICAL config (seed 42, batch 1024, history 8,
# lr 6e-3, adamw_lr_mult 0.5, wd 0.01) — the ONLY change is policy_embedding:
# true, which adds a mish(Linear(1024,1024)) pre-projection of the encoder
# output before the from/to attention map (+1.05M params). This is the sole
# structural difference between BT4's policy head and ours.
project_name: "chess-decoder"
run_name: "bt4_history8_polembed"

data:
  parquet_dir: "data/parquets"
  cache_dir: "data/cache"
  batch_size: 1024
  num_workers: 4
  positions_per_game: 1
  history: 8

model:
  embed_dim: 1024
  num_heads: 32
  num_layers: 15
  d_ff: 1536
  attention_variant: "geom"
  policy_head: "cross_attn"
  input_mode: "lc0_64"
  history: 8
  policy_embedding: true        # <-- the only difference vs bt4_history8_long

training:
  optimizer: "muon"
  learning_rate: 6.0e-3
  adamw_lr_mult: 0.5
  weight_decay: 0.01
  grad_clip: 1.0
  gradient_accumulation_steps: 1
  num_epochs: 1000
  log_every_n_steps: 5
  save_every_n_steps: 64000
  device: "cuda"
  use_amp: true
  use_fp8: true
  fp8_recipe: "tensorwise"
  fp8_compile: true
  checkpoint_dir: "checkpoints/bt4_history8_polembed/"
  seed: 42
  resume_from: null
  reset_data_iteration: false
  max_steps: 64000
  peak_tflops: 1979
  val_pct: 2
  val_every_n_steps: 1000
  val_batches: 64

loss:
  policy_weight: 5.0
  wdl_weight: 1.0
