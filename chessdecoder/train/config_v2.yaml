# V2 pretraining config (encoder-latents + causal decoder + transition head).
# V1 config.yaml is left untouched on main as the comparison baseline.
project_name: "chess-decoder"   # same project as the original decoder for comparison
run_name: "v2-pretrain-muon1e3"

data:
  parquet_dir: "/home/maxime/parquet_files_decoder/"
  batch_size: 384        # FP8 frees ~30 GiB peak -> bump batch from 256 (V1-like regime)
  num_workers: 8
  max_plies: 10          # random start + crop; seq = 10*(16+2) = 180. Curriculum:
                         # short context now (fast policy), grow later in training.

model:
  embed_dim: 1024
  num_heads: 16
  num_encoder_layers: 8
  num_decoder_layers: 10   # ~116M-class total to keep comparable to V1
  num_latents: 16
  board_max_seq_len: 68
  d_ff: 1536
  n_buckets: 100
  wl_sigma: 0.4
  value_hidden_size: 256
  num_fourier_freq: 128

training:
  # Sweep co-winning config (Muon/1e-3/wd0/gc1, ELO 1152 — markdowns/11 §13).
  optimizer: "muon"
  learning_rate: 1.0e-3
  weight_decay: 0.01
  grad_clip: 1
  gradient_accumulation_steps: 1     # accum=1 like V1 -> 1 weight update / step, eff batch 256
  num_epochs: 100
  log_every_n_steps: 10
  save_every_n_steps: 2000
  max_track_nth_moves: 20
  device: "cuda"
  use_amp: true
  use_fp8: true           # Phase 1: swap hot Linears for torchao Float8Linear
                          # (paired with bf16 autocast, no GradScaler).
  fp8_recipe: "tensorwise"   # tensorwise | rowwise | rowwise_with_gw_hp
  fp8_compile: true       # torch.compile encoder+decoder — required for fp8
                          # to actually beat bf16 (fuses the FP8 cast+matmul).
  checkpoint_dir: "checkpoints/v2_pretrain_muon1e3/"
  seed: 42
  resume_from: "checkpoints/v2_pretrain_muon1e3/v2-pretrain-muon1e3_20260518_075615/"
  reset_data_iteration: true   # dataset 3x larger now -> iterate fresh, no fast-forward

loss:
  policy_weight: 5.0
  transition_weight: 1.0
  wdl_weight: 1.0          # single joint WDL head (markdowns/12)
