# V2 pretraining config (encoder-latents + causal decoder + transition head).
# V1 config.yaml is left untouched on main as the comparison baseline.
project_name: "chess-decoder-v2"
run_name: "v2-run-1"

data:
  parquet_dir: "/workspace/ChessDecoder/parquet_files_decoder/"
  batch_size: 16
  num_workers: 8
  max_plies: 64          # decoder seq len = max_plies * (num_latents + 3)

model:
  embed_dim: 1024
  num_heads: 16
  num_encoder_layers: 10
  num_decoder_layers: 8   # ~116M-class total to keep comparable to V1
  num_latents: 16
  board_max_seq_len: 68
  d_ff: 1536
  n_buckets: 100
  wl_sigma: 0.4
  value_hidden_size: 256
  num_fourier_freq: 128

training:
  learning_rate: 3.0e-4   # informed by the V2 HP sweep (3e-4 dominant)
  weight_decay: 0.1
  optimizer: "adamw"
  gradient_accumulation_steps: 4
  grad_clip: 10.0
  num_epochs: 100
  log_every_n_steps: 4
  save_every_n_steps: 1000
  device: "cuda"
  use_amp: true
  checkpoint_dir: "checkpoints/"
  seed: 42
  resume_from: null

loss:
  policy_weight: 5.0
  transition_weight: 1.0
  wl_weight: 1.0
  d_weight: 1.0
