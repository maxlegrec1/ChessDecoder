# BT4-SHAPE BASELINE (our architecture, no smolgen).
# Matches BT4's shape: 15 layers, embed 1024, 32 heads, FFN 1536 (SwiGLU here,
# vs BT4's mish). geom attention bias, cross_attn policy head, lc0_64 input.
# This is the reference to beat on LOSS-PER-STEP at fixed batch 2048.
# HARD constraints for the whole study: num_layers=15, embed_dim=1024, batch=2048.
project_name: "chess-decoder"
run_name: "bt4_baseline"

data:
  parquet_dir: "data/parquets"
  cache_dir: "data/cache"
  batch_size: 1024             # micro-batch; effective = 1024 * grad_accum(2) = 2048 (FIXED)
  num_workers: 4
  positions_per_game: 1

model:
  embed_dim: 1024              # FIXED
  num_heads: 32                # BT4 shape (32 dim/head)
  num_layers: 15               # FIXED
  d_ff: 1536                   # BT4 FFN width (SwiGLU hidden)
  attention_variant: "geom"
  policy_head: "cross_attn"
  input_mode: "lc0_64"

training:
  optimizer: "muon"
  learning_rate: 3.0e-3
  weight_decay: 0.01
  grad_clip: 1.0
  gradient_accumulation_steps: 2   # 1024 micro * 2 = 2048 effective batch (FIXED)
  num_epochs: 1000
  log_every_n_steps: 5             # fine-grained for the loss/step analysis
  save_every_n_steps: 5000
  device: "cuda"
  use_amp: true
  use_fp8: true
  fp8_recipe: "tensorwise"
  fp8_compile: true
  checkpoint_dir: "checkpoints/bt4_baseline/"
  seed: 42
  resume_from: null
  reset_data_iteration: false
  max_steps: 50000
  peak_tflops: 1979
  val_pct: 2
  val_every_n_steps: 1000
  val_batches: 8

loss:
  policy_weight: 5.0
  wdl_weight: 1.0
