# Agent pretraining v2 — 17-task registry mix (see tasks/stream.py DEFAULT_MIX
# for the reference weights; task_mix below overrides).
project_name: "search-agent"
run_name: "pretrain-v2"

data:
  parquet_dir: "/mnt/2tb_2/decoder/parquet_files_decoder"
  label_glob: "agent_data/t5_labels_train_*.parquet"
  val_labels: "agent_data/t5_labels_val.parquet"
  paired_glob: "agent_data/paired_labels_train_*.parquet"
  val_paired_glob: "agent_data/paired_labels_val.parquet"
  batch_size: 8
  num_workers: 1   # 15GiB box: stay conservative on RAM
  val_streams: 144

task_mix:
  t1_copy: 0.02
  t2_apply: 0.11
  t3_line: 0.15
  t4_agg: 0.08
  t5_distill: 0.20
  t6_distance: 0.04
  t7_legal: 0.06
  t8_played: 0.06
  t10_lastmove: 0.03
  t11_horizon: 0.03
  t12_path: 0.08
  t13_traj: 0.03
  t14_swing: 0.02
  t15_bestcolor: 0.02
  t16_reach: 0.01
  t17_opening: 0.02
  t18_fill: 0.04

model:
  embed_dim: 768
  num_heads: 12
  num_layers: 12
  d_ff: 2048
  max_seq_len: 8192

training:
  optimizer: "muon"
  learning_rate: 1.5e-3
  weight_decay: 0.01
  grad_clip: 1.0
  warmup_steps: 500
  max_steps: 50000
  log_every_n_steps: 50
  val_every_n_steps: 1000
  save_every_n_steps: 5000
  compile: true
  checkpoint_dir: "checkpoints/agent_pretrain_v2/"
  seed: 42
  resume_from: "checkpoints/agent_pretrain_v2/pretrain-v2_20260611_144726/agent_latest_full.pt"
