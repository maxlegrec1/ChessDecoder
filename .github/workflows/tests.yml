name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies (no C++ extensions)
        run: |
          uv venv
          uv pip install torch --index-url https://download.pytorch.org/whl/cpu
          uv pip install pyarrow python-chess pyyaml numpy pytest torchtune pyflakes

      - name: Lint (pyflakes — unused imports and undefined names)
        run: |
          # Run pyflakes and fail only on high-signal categories.
          # Cosmetic warnings (unused locals, f-strings without placeholders)
          # are intentionally allowed through.
          .venv/bin/python -m pyflakes src/ 2>&1 | tee /tmp/pyflakes.out
          if grep -E "imported but unused|undefined name" /tmp/pyflakes.out; then
            echo "::error::pyflakes found unused imports or undefined names"
            exit 1
          fi

      - name: Run tests (CPU-only, no GPU/C++ engine)
        run: .venv/bin/pytest tests/ -m "not gpu and not cpp" -v
        env:
          PYTHONPATH: .
