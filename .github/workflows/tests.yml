name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies (no C++ extensions)
        run: |
          uv sync --no-install-package decoder-inference-cpp \
                   --no-install-package chessrl-inference-cpp

      - name: Run tests (CPU-only, no GPU/C++ engine)
        run: uv run pytest tests/ -m "not gpu and not cpp" -v
